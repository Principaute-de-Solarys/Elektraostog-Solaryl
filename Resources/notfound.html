<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erreur de chargement - Page inaccessible</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f056b, #0044ff);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-in-out;
        }

        p {
            font-size: 1.1rem;
            max-width: 500px;
            line-height: 1.5;
            margin: 10px 20px;
        }

        .url {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 10px;
            border-radius: 6px;
            font-family: monospace;
            word-break: break-all;
        }

        button {
            margin-top: 25px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
        }

        footer {
            position: absolute;
            bottom: 15px;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <h1>Erreur de chargement</h1>
    <p>La page demandée n'existe pas ou a été déplacée.</p>
    <p>URL : <span id="page" class="url"></span></p>
    <p>Code d'erreur : <span id="code" class="url"></span></p>
    <button onclick="window.history.back()">Retour à la page précédente</button>
    <footer>Elektraostog Solaryl</footer>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await CefSharp.BindObjectAsync("solarysErrorPage");
            if (window.solarysErrorPage && window.solarysErrorPage.getErrorCode) {
                const data = await solarysErrorPage.getErrorCode();
                document.getElementById("page").textContent = window.location.href
                document.getElementById("code").textContent = data.errorCode
            }
        });
    </script>
</body>
</html>
