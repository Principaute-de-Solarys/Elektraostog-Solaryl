<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres du navigateur</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #0f056b, #0044ff);
            background-attachment: fixed;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow-y: auto;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            animation: fadeIn 1s ease-in-out;
        }

        h2 {
            font-size: 1.5rem;
            margin-top: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            padding-bottom: 5px;
            width: 80%;
            max-width: 600px;
        }

        .setting {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 80%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 10px;
            margin: 10px 0;
        }

        .setting label {
            font-size: 1rem;
        }

        .setting input[type="checkbox"] {
            width: 20px;
            height: 20px;
            border-radius: 5px;
        }

        .setting input[type="text"], .setting select {
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 1rem;
            width: 60%;
        }

        button {
            margin-top: 25px;
            background: #fff;
            color: #333;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #f1f1f1;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 20px;
            bottom: 15px;
            font-size: 0.85rem;
            opacity: 0.8;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <h1>Paramètres du navigateur</h1>

    <h2>Personnalisation</h2>
    <div class="setting">
        <label for="darkmode">Mode sombre automatique</label>
        <input type="checkbox" id="darkmode">
    </div>

    <div class="setting">
        <label for="homepage">Page d'accueil</label>
        <input type="text" id="homepage" placeholder="https://www.google.com/">
    </div>
    
    <div class="setting">
        <label for="searchEngine">Moteur de recherche</label>
        <select id="searchEngine">
            <option value="https://duckduckgo.com/?q=">DuckDuckGo</option>
            <option value="https://www.google.com/search?q=">Google</option>
            <option value="https://www.qwant.com/?l=fr&q=">Qwant</option>
            <option value="https://www.bing.com/search?q=">Bing</option>
            <option value="https://search.yahoo.com/search?p=">Yahoo</option>
        </select>
    </div>

    <div class="setting">
        <label for="theme">Thème</label>
        <select id="theme">
            <option value="New">Nouveau (par défaut)</option>
            <option value="Default">Ancien</option>
        </select>
    </div>

    <button onclick="saveSettings()">Enregistrer</button>

    <footer>Elektraostog Solaryl</footer>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            await CefSharp.BindObjectAsync("solarysSettings");
            if (window.solarysSettings && window.solarysSettings.getSettings) {
                const data = await solarysSettings.getSettings();
                document.getElementById("darkmode").checked = data.darkmode;
                document.getElementById("homepage").value = data.homepage;
                document.getElementById("searchEngine").value = data.searchengine;
                document.getElementById("theme").value = data.theme;
            }
        });

        function saveSettings() {
            const darkmode = document.getElementById("darkmode").checked
            const homepage = document.getElementById("homepage").value
            const searchengine = document.getElementById("searchEngine").value
            const theme = document.getElementById("theme").value

            if (window.solarysSettings && window.solarysSettings.saveSettings) {
                solarysSettings.saveSettings(darkmode, homepage, searchengine, theme);
                alert("Paramètres enregistrés ! Vous devez redémarrer Elektraostog Solaryl pour appliquer les changements.");
            } else {
                alert("Impossible d'enregistrer : interface manquante côté navigateur.");
            }
        }
    </script>
</body>
</html>
